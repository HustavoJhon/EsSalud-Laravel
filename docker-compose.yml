version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: essalud-laravel-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: "EsSalud"
      APP_ENV: local
      APP_KEY: base64:OZoYL7dfKBpB1mVXJSz7UBcjFPJDgVQ2TFXUMu1D2ik=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: essalud
      DB_USERNAME: essalud
      DB_PASSWORD: essalud_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: essalud_docs
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: essalud
    depends_on:
      - mysql
      - redis
      - qdrant
      - minio
    volumes:
      - .:/var/www/html
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs

  nginx:
    image: nginx:alpine
    container_name: essalud-laravel-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: essalud-laravel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: essalud
      MYSQL_USER: essalud
      MYSQL_PASSWORD: essalud_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: essalud-laravel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: essalud-laravel-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: essalud-laravel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  queue-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: essalud-laravel-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=300
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: essalud
      DB_USERNAME: essalud
      DB_PASSWORD: essalud_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - mysql
      - redis
      - qdrant

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: essalud-laravel-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: essalud
      DB_USERNAME: essalud
      DB_PASSWORD: essalud_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  minio_data:
